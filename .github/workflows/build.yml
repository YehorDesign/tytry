name: Build installers

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: dist
            artifact: dist/TYTRY-Setup-*.exe
          - os: macos-latest
            script: dist:mac
            artifact: dist/TYTRY-*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ${{ matrix.script }}
        env:
          # не пытаться публиковать релиз, просто собрать
          EP_DRAFT: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: tytry-${{ matrix.os }}
          path: ${{ matrix.artifact }}
